services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres_smoke_local
    ports:
      - "127.0.0.1::5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres_smoke_local"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s
    volumes:
      - postgres_smoke_data:/var/lib/postgresql/data

volumes:
  postgres_smoke_data:
