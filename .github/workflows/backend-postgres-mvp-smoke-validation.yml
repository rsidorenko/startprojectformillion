name: backend-postgres-mvp-smoke-validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/backend-postgres-mvp-smoke-validation.yml"
      - "backend/pyproject.toml"
      - "backend/src/**"
      - "backend/tests/**"
      - "backend/migrations/**"
      - "backend/scripts/run_postgres_mvp_smoke_local.py"
      - "backend/scripts/run_postgres_mvp_smoke.py"
      - "backend/scripts/run_slice1_retention_dry_run.py"
      - "backend/scripts/check_admin_support_internal_read_gate.py"
      - "backend/scripts/check_adm01_postgres_issuance_composition.py"
      - "backend/scripts/check_adm01_internal_http_entrypoint_smoke.py"
      - "backend/scripts/check_issuance_operator_entrypoint_smoke.py"
      - "backend/scripts/check_operator_billing_ingest_apply_e2e.py"
      - "backend/docs/admin_support_internal_read_gate_runbook.md"
      - "backend/docs/postgres_mvp_smoke_runbook.md"
      - "backend/docs/issuance_operator_runbook.md"
      - "backend/docs/slice1_retention_manual_cleanup_runbook.md"
      - "backend/docs/slice1_retention_dry_run_runbook.md"
      - "backend/docs/slice1_retention_scheduled_runbook.md"
      - "backend/docs/billing_subscription_apply_runbook.md"
      - "backend/docs/billing_operator_ingest_apply_runbook.md"
      - "backend/docker-compose.postgres-smoke.yml"
  push:
    branches:
      - "main"
    paths:
      - ".github/workflows/backend-postgres-mvp-smoke-validation.yml"
      - "backend/pyproject.toml"
      - "backend/src/**"
      - "backend/tests/**"
      - "backend/migrations/**"
      - "backend/scripts/run_postgres_mvp_smoke_local.py"
      - "backend/scripts/run_postgres_mvp_smoke.py"
      - "backend/scripts/run_slice1_retention_dry_run.py"
      - "backend/scripts/check_admin_support_internal_read_gate.py"
      - "backend/scripts/check_adm01_postgres_issuance_composition.py"
      - "backend/scripts/check_adm01_internal_http_entrypoint_smoke.py"
      - "backend/scripts/check_issuance_operator_entrypoint_smoke.py"
      - "backend/scripts/check_operator_billing_ingest_apply_e2e.py"
      - "backend/docs/admin_support_internal_read_gate_runbook.md"
      - "backend/docs/postgres_mvp_smoke_runbook.md"
      - "backend/docs/issuance_operator_runbook.md"
      - "backend/docs/slice1_retention_manual_cleanup_runbook.md"
      - "backend/docs/slice1_retention_dry_run_runbook.md"
      - "backend/docs/slice1_retention_scheduled_runbook.md"
      - "backend/docs/billing_subscription_apply_runbook.md"
      - "backend/docs/billing_operator_ingest_apply_runbook.md"
      - "backend/docker-compose.postgres-smoke.yml"

jobs:
  slice1-postgres-mvp-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      REPORT_DIR: test-reports
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: python -m pip install -e .[test]

      - name: Prepare validation reports directory
        run: mkdir -p "$REPORT_DIR"

      - name: Run admin support internal read gate (advisory evidence)
        id: admin_support_internal_read_gate
        continue-on-error: true
        run: python scripts/check_admin_support_internal_read_gate.py

      - name: Run ADM-01 internal HTTP entrypoint smoke (blocking gate)
        id: adm01_internal_http_entrypoint_smoke
        run: python scripts/check_adm01_internal_http_entrypoint_smoke.py

      - name: Run issuance operator entrypoint smoke (blocking gate)
        id: issuance_operator_entrypoint_smoke
        run: python scripts/check_issuance_operator_entrypoint_smoke.py

      - name: Write admin support internal read gate advisory summary marker
        if: always()
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          report_dir = Path(os.environ["REPORT_DIR"])
          summary_path = report_dir / "backend-admin-support-internal-read-gate-summary.txt"
          outcome = "${{ steps.admin_support_internal_read_gate.outcome }}"
          normalized = outcome if outcome in {"success", "failure"} else "unknown"

          summary_lines = [
              "admin support internal read gate advisory outcome marker",
              f"internal_read_gate_outcome={normalized}",
          ]
          summary_path.write_text("\n".join(summary_lines) + "\n", encoding="utf-8")
          PY

      - name: Write ADM-01 internal HTTP entrypoint smoke blocking summary marker
        if: always()
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          report_dir = Path(os.environ["REPORT_DIR"])
          summary_path = report_dir / "backend-adm01-internal-http-entrypoint-smoke-summary.txt"
          outcome = "${{ steps.adm01_internal_http_entrypoint_smoke.outcome }}"
          normalized = outcome if outcome in {"success", "failure"} else "unknown"

          summary_lines = [
              "adm01 internal http entrypoint smoke blocking gate outcome marker",
              f"adm01_entrypoint_smoke_outcome={normalized}",
          ]
          summary_path.write_text("\n".join(summary_lines) + "\n", encoding="utf-8")
          PY

      - name: Write issuance operator entrypoint smoke blocking summary marker
        if: always()
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          report_dir = Path(os.environ["REPORT_DIR"])
          summary_path = report_dir / "backend-issuance-operator-entrypoint-smoke-summary.txt"
          outcome = "${{ steps.issuance_operator_entrypoint_smoke.outcome }}"
          normalized = outcome if outcome in {"success", "failure"} else "unknown"

          summary_lines = [
              "issuance operator entrypoint smoke blocking gate outcome marker",
              f"issuance_operator_entrypoint_smoke_outcome={normalized}",
          ]
          summary_path.write_text("\n".join(summary_lines) + "\n", encoding="utf-8")
          PY

      - name: Run full backend regression tests (advisory evidence, non-blocking)
        id: full_backend_regression
        continue-on-error: true
        run: python -m pytest -q --junitxml="$REPORT_DIR/backend-full-regression.xml"

      - name: Write full regression advisory summary marker
        if: always()
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          report_dir = Path(os.environ["REPORT_DIR"])
          summary_path = report_dir / "backend-full-regression-summary.txt"
          outcome = "${{ steps.full_backend_regression.outcome }}"
          normalized = outcome if outcome in {"success", "failure"} else "unknown"

          summary_lines = [
              "backend full regression advisory outcome marker",
              f"full_regression_outcome={normalized}",
          ]
          summary_path.write_text("\n".join(summary_lines) + "\n", encoding="utf-8")
          PY

      - name: Check Docker and Compose
        run: docker --version && docker compose version

      - name: Run targeted smoke helper regression (blocking gate)
        run: python -m pytest -q tests/test_run_postgres_mvp_smoke_local.py tests/test_run_postgres_mvp_smoke.py tests/test_run_slice1_retention_dry_run.py --junitxml="$REPORT_DIR/backend-smoke-helper-regression.xml"

      - name: Run real local isolated PostgreSQL MVP smoke (blocking gate)
        run: |
          set -o pipefail
          python scripts/run_postgres_mvp_smoke_local.py 2>&1 | tee "$REPORT_DIR/backend-postgres-mvp-smoke-local.log"

      - name: Write smoke output summary
        if: always()
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          report_dir = Path(os.environ["REPORT_DIR"])
          smoke_log = report_dir / "backend-postgres-mvp-smoke-local.log"
          summary_path = report_dir / "backend-postgres-mvp-smoke-local-summary.txt"

          if not smoke_log.exists():
              summary_path.write_text(
                  "smoke log missing\n",
                  encoding="utf-8",
              )
              raise SystemExit(0)

          lines = smoke_log.read_text(encoding="utf-8", errors="replace").splitlines()
          if not lines:
              summary_path.write_text("smoke log is empty\n", encoding="utf-8")
              raise SystemExit(0)

          max_lines = 80
          start_index = max(0, len(lines) - max_lines)
          trimmed = lines[start_index:]

          summary_lines = [
              "safe smoke output summary (tail)",
              f"total_lines={len(lines)}",
              f"tail_lines={len(trimmed)}",
              "",
              *trimmed,
          ]
          summary_path.write_text("\n".join(summary_lines) + "\n", encoding="utf-8")
          PY

      - name: Verify validation reports evidence
        if: always()
        run: |
          pwd
          test -d "$REPORT_DIR"
          find "$REPORT_DIR" -maxdepth 1 -type f -exec basename {} \;
          find "$REPORT_DIR" -maxdepth 1 -type f | grep -q .

      - name: Upload validation reports artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: backend-postgres-mvp-smoke-validation-reports
          path: backend/test-reports
          if-no-files-found: warn

  # Blocking: real PostgreSQL (GitHub Actions service) for opt-in slice-1 retention
  # integration tests. DATABASE_URL is service-local and disposable, not a repo secret.
  slice1-postgres-retention-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      REPORT_DIR: test-reports
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: slice1ret_ci
          POSTGRES_PASSWORD: slice1retCILocal0nly
          POSTGRES_DB: slice1retention_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U slice1ret_ci -d slice1retention_ci"
          --health-interval 4s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: python -m pip install -e .[test]

      - name: Prepare test reports directory
        run: mkdir -p "$REPORT_DIR"

      - name: Run ADM-01 Postgres issuance composition check (advisory)
        id: adm01_postgres_issuance_composition
        continue-on-error: true
        env:
          DATABASE_URL: postgresql://slice1ret_ci:slice1retCILocal0nly@127.0.0.1:5432/slice1retention_ci
          ADM01_POSTGRES_ISSUANCE_COMPOSITION_CHECK_ENABLE: "1"
        run: python scripts/check_adm01_postgres_issuance_composition.py

      - name: Run opt-in slice-1 retention integration tests (PostgreSQL service)
        env:
          DATABASE_URL: postgresql://slice1ret_ci:slice1retCILocal0nly@127.0.0.1:5432/slice1retention_ci
        run: |
          set -euo pipefail
          python -m pytest -q \
            tests/test_postgres_retention_cleanup_dry_run_integration.py \
            tests/test_postgres_retention_cleanup_delete_integration.py \
            tests/test_postgres_retention_scheduled_dry_run_integration.py \
            tests/test_postgres_retention_scheduled_delete_integration.py \
            tests/test_postgres_retention_scheduled_opt_in_dry_run_integration.py \
            tests/test_postgres_retention_outbound_delivery_ledger_integration.py \
            tests/test_postgres_billing_events_ledger.py \
            tests/test_postgres_billing_ingestion.py \
            tests/test_postgres_billing_ingestion_main.py \
            tests/test_postgres_migration_ledger_integration.py \
            tests/test_postgres_uc05_apply_billing_fact.py \
            tests/test_postgres_billing_subscription_apply_main.py \
            tests/test_run_operator_billing_ingest_apply_e2e.py \
            tests/test_postgres_issuance_state.py \
            tests/test_postgres_issuance_service_integration.py \
            tests/test_postgres_adm01_issuance_read_adapter.py \
            --junitxml="$REPORT_DIR/backend-postgres-retention-integration.xml"

      - name: Run operator billing ingest/apply e2e smoke (advisory evidence)
        id: operator_billing_ingest_apply_e2e
        continue-on-error: true
        env:
          DATABASE_URL: postgresql://slice1ret_ci:slice1retCILocal0nly@127.0.0.1:5432/slice1retention_ci
          BILLING_NORMALIZED_INGEST_ENABLE: "1"
          BILLING_SUBSCRIPTION_APPLY_ENABLE: "1"
        run: python scripts/check_operator_billing_ingest_apply_e2e.py

      - name: Write operator billing ingest/apply e2e advisory summary marker
        if: always()
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          report_dir = Path(os.environ["REPORT_DIR"])
          summary_path = report_dir / "backend-operator-billing-ingest-apply-e2e-summary.txt"
          outcome = "${{ steps.operator_billing_ingest_apply_e2e.outcome }}"
          normalized = "success" if outcome == "success" else "failure"

          summary_lines = [
              "operator billing ingest/apply e2e advisory outcome marker",
              f"operator_billing_ingest_apply_e2e_outcome={normalized}",
          ]
          summary_path.write_text("\n".join(summary_lines) + "\n", encoding="utf-8")
          PY

      - name: Verify retention integration JUnit report
        if: always()
        run: |
          set -euo pipefail
          test -d "$REPORT_DIR"
          test -f "$REPORT_DIR/backend-postgres-retention-integration.xml"
          test -s "$REPORT_DIR/backend-postgres-retention-integration.xml"

      - name: Upload retention integration reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: backend-postgres-retention-integration-reports
          path: backend/test-reports
          if-no-files-found: warn
